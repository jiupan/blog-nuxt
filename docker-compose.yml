services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: nuxt_blog
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  twikoo:
    image: imaegoo/twikoo
    restart: unless-stopped
    environment:
      TWIKOO_THROTTLE: ${TWIKOO_THROTTLE:-1000}
    volumes:
      - twikoo-data:/app/data
    ports:
      - "8080:8080"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - postgres
      - twikoo
    environment:
      DATABASE_URL: postgresql://blog:blog_password@postgres:5432/nuxt_blog?schema=public
      NUXT_SESSION_PASSWORD: replace-with-at-least-32-characters-secret
      NUXT_PUBLIC_TWIKOO_ENV_ID: ${NUXT_PUBLIC_TWIKOO_ENV_ID:-http://localhost:8080}
      UPLOAD_DIR: /app/uploads
      KNOWLEDGE_FILE_DIR: /app/data/knowledge-files
      SITE_URL: http://localhost
      SITE_NAME: Jiupan Blog
    volumes:
      - uploads:/app/uploads
      - knowledge-files:/app/data/knowledge-files
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  twikoo-data:
  uploads:
  knowledge-files:
