services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # 如果不需要外部访问数据库，可以注释掉下面这行
    # ports:
    #   - "5432:5432"

  twikoo:
    image: imaegoo/twikoo
    restart: unless-stopped
    environment:
      TWIKOO_THROTTLE: ${TWIKOO_THROTTLE:-1000}
    volumes:
      - twikoo-data:/app/data
    ports:
      - "127.0.0.1:8080:8080"

  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    depends_on:
      - postgres
      - twikoo
    env_file:
      - .env
    environment:
      UPLOAD_DIR: /app/uploads
      KNOWLEDGE_FILE_DIR: /app/data/knowledge-files
    volumes:
      - uploads:/app/uploads
      - knowledge-files:/app/data/knowledge-files
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  twikoo-data:
  uploads:
  knowledge-files:
