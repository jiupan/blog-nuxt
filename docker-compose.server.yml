services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # 如果不需要外部访问数据库，可以注释掉下面这行
    # ports:
    #   - "5432:5432"

  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  uploads:
